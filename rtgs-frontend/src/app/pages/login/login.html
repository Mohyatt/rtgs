<div class="login-page">
  <div class="login-card">
    <!-- LOGO -->
    <div class="login-logo">
      <span class="logo-text logo-xl">
        <span class="logo-rt">RT</span><span class="logo-g">G</span><span class="logo-rt">S</span>
      </span>
      <div class="login-subtitle">Référentiel des Tunnels — BETuF</div>
    </div>

    <!-- FORM -->
    <form [formGroup]="form" (ngSubmit)="submit()" class="login-form">
      @if (errorMsg()) {
        <div class="warning-box" style="margin-bottom:1rem; color:var(--red);">
          {{ errorMsg() }}
        </div>
      }
      <div class="form-group">
        <label class="form-label">Adresse email</label>
        <input class="form-control" type="email" formControlName="email" placeholder="prenom.nom@betuf.fr" autocomplete="email" />
      </div>
      <div class="form-group">
        <label class="form-label">Mot de passe</label>
        <input class="form-control" type="password" formControlName="motDePasse" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <button type="submit" class="btn btn-primary btn-full" [disabled]="form.invalid || loading()">
        @if (loading()) { Connexion en cours… } @else { Se connecter }
      </button>
    </form>

  </div>
</div>
