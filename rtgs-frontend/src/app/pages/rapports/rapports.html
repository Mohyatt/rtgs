<div class="page-header">
  <div>
    <h1 class="page-title">Rapports</h1>
    <p class="page-subtitle">Génération de rapports PDF — réservé ADMIN / Chargé de Mission</p>
  </div>
</div>

<div class="form-card" style="max-width:620px;">
  <form [formGroup]="form" (ngSubmit)="generer()">
    <div class="form-section">
      <h3 class="form-section-title">Paramètres du rapport</h3>

      <div class="form-group">
        <label class="form-label">Type de rapport</label>
        <select class="form-control" formControlName="type">
          @for (t of types; track t.value) {
            <option [value]="t.value">{{ t.label }}</option>
          }
        </select>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Date de début</label>
          <input class="form-control" type="date" formControlName="dateDebut" />
        </div>
        <div class="form-group">
          <label class="form-label">Date de fin</label>
          <input class="form-control" type="date" formControlName="dateFin" />
        </div>
      </div>
    </div>

    <div class="form-footer">
      <button type="submit" class="btn btn-primary" [disabled]="generating()">
        @if (generating()) { Génération en cours… } @else { 📄 Générer le PDF }
      </button>
    </div>
  </form>
</div>
